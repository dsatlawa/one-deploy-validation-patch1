---
# Storage benchmarking. Execute the block below only when validation.storage_benchmark is enabled.
- name: Run Storage benchmark test
  block:
  - name: Get VM template as JSON
    ansible.builtin.shell: >
      onetemplate show "{{ validation.test_vm.vm.market_name }}{{ current_cluster.name_suffix }}" -j
    register: image_output
    failed_when: "image_output.rc != 0 and image_output.stdout == ''"
    when: current_cluster.name not in _test_vm_template_image_ids_map

  - name: Set benchmark image ID for this cluster
    ansible.builtin.set_fact:
      _sb_image_id: >-
        {{ _test_vm_template_image_ids_map[current_cluster.name]
           if current_cluster.name in _test_vm_template_image_ids_map
           else (image_output.stdout | from_json | json_query('VMTEMPLATE.TEMPLATE.DISK.IMAGE_ID')) }}

  - name: Instantiate benchmark VM
    ansible.builtin.shell: >
      onetemplate instantiate "{{ validation.test_vm.vm.market_name }}{{ current_cluster.name_suffix }}" --nic '{{ current_cluster.storage_vnet_name }}' --disk {{ _sb_image_id }}:size=8000 --mem 1g
    register: benchmarkvm_id
    failed_when: "benchmarkvm_id.rc != 0"
    retries: 3
    delay: 20

  - name: Wait for benchmark VM to come up
    ansible.builtin.shell: >
      onevm list --f ID={{ benchmarkvm_id.stdout.split(':')[1] | trim }} -l STAT --no-header
    register: benchmarkvm_state
    failed_when: "benchmarkvm_state.rc != 0"
    until: benchmarkvm_state.stdout == "runn"
    retries: 10
    delay: 20

  - name: Get Benchmark VM IP
    ansible.builtin.shell: >
      onevm list --f ID={{ benchmarkvm_id.stdout.split(':')[1] | trim }} -l IP --no-header
    register: vm_ip
    failed_when: "vm_ip.rc != 0"

  - name: Verify ssh connection to the benchmark VM
    ansible.builtin.shell: >
      ssh -i ~oneadmin/.ssh/id_rsa -q -oStrictHostKeyChecking=no root@{{ vm_ip.stdout }}
    register: ssh_conn_result
    until: ssh_conn_result.rc == 0
    retries: 20
    delay: 20

  - name: Set DNS on benchmark VM
    become: true
    become_user: oneadmin
    ansible.builtin.shell: >
      ssh -q -oStrictHostKeyChecking=no root@{{ vm_ip.stdout }}
      'printf "nameserver 1.1.1.1\nnameserver 8.8.8.8\n" > /etc/resolv.conf'
    when: not (validation.storage_benchmark.skip_fio_install | d(false))

  # Semi air-gapped deployments use an image with fio preinstalled.
  - name: Install fio on benchmark VM
    become: true
    become_user: oneadmin
    ansible.builtin.shell: |
      ssh -q -oStrictHostKeyChecking=no root@{{ vm_ip.stdout }} apk update > /dev/null
      ssh -q -oStrictHostKeyChecking=no root@{{ vm_ip.stdout }} apk add fio > /dev/null
    when: not (validation.storage_benchmark.skip_fio_install | d(false))

  - name: Run Storage benchmark suite
    become: true
    become_user: oneadmin
    ansible.builtin.shell: |
      ssh -q -oStrictHostKeyChecking=no root@{{ vm_ip.stdout }} 'cat > /tmp/onebench.fio << "EOF"
      [global]
      time_based=1
      group_reporting=1
      direct=1
      ioengine=libaio
      filename=/tmp/onebench.testfile
      size=4G
      randrepeat=0
      norandommap=1
      invalidate=1
      thread=1
      lat_percentiles=1
      percentile_list=99
      ramp_time=5
      runtime=5

      [rr_4k_qd1]
      rw=randread
      bs=4k
      iodepth=1
      numjobs=1
      stonewall

      [rr_4k_qd4]
      rw=randread
      bs=4k
      iodepth=4
      numjobs=1
      stonewall

      [rr_4k_qd16]
      rw=randread
      bs=4k
      iodepth=16
      numjobs=1
      stonewall

      [rr_4k_qd64]
      rw=randread
      bs=4k
      iodepth=64
      numjobs=1
      stonewall

      [rr_4k_qd32]
      rw=randread
      bs=4k
      iodepth=32
      numjobs=1
      stonewall

      [rw_4k_qd1]
      rw=randwrite
      bs=4k
      iodepth=1
      numjobs=1
      stonewall

      [rw_4k_qd4]
      rw=randwrite
      bs=4k
      iodepth=4
      numjobs=1
      stonewall

      [rw_4k_qd16]
      rw=randwrite
      bs=4k
      iodepth=16
      numjobs=1
      stonewall

      [rw_4k_qd64]
      rw=randwrite
      bs=4k
      iodepth=64
      numjobs=1
      stonewall

      [rw_4k_qd32]
      rw=randwrite
      bs=4k
      iodepth=32
      numjobs=1
      stonewall

      [mix_4k_70r_qd16]
      rw=randrw
      bs=4k
      iodepth=16
      rwmixread=70
      numjobs=1
      stonewall

      [mix_64k_70r_qd16]
      rw=randrw
      bs=64k
      iodepth=16
      rwmixread=70
      numjobs=1
      stonewall

      [seqr_1m_qd4]
      rw=read
      bs=1m
      iodepth=4
      numjobs=1
      stonewall

      [seqr_128k_qd16]
      rw=read
      bs=128k
      iodepth=16
      numjobs=1
      stonewall

      [seqw_1m_qd4]
      rw=write
      bs=1m
      iodepth=4
      numjobs=1
      stonewall

      [seqw_128k_qd16]
      rw=write
      bs=128k
      iodepth=16
      numjobs=1
      stonewall

      [syncwrite_4k_qd1]
      rw=write
      bs=4k
      iodepth=1
      fsync_on_close=1
      end_fsync=1
      numjobs=1
      stonewall
      EOF'
      ssh -q -oStrictHostKeyChecking=no root@{{ vm_ip.stdout }} "fio /tmp/onebench.fio --output-format=json"
    register: fio_suite
    failed_when: "fio_suite.rc != 0"

  - name: Parse storage benchmark results
    ansible.builtin.set_fact:
      storage_benchmark: >-
        {{
          storage_benchmark | default({}) | combine({
            (inventory_hostname ~ current_cluster.report_suffix): {
              'fio_raw': (fio_suite.stdout | from_json),
              'profiles': (fio_suite.stdout | from_json | json_query('jobs[].{name: jobname, rw: "job options".rw, bs: "job options".bs, iodepth: "job options".iodepth, read_iops: read.iops, read_bw_kib: read.bw, read_p99_ns: read.clat_ns.percentile."99.000000", write_iops: write.iops, write_bw_kib: write.bw, write_p99_ns: write.clat_ns.percentile."99.000000" }') )
            }
          }, recursive=True)
        }}

  - name: Delete benchmark VM
    ansible.builtin.shell: |
      onevm terminate --hard {{ benchmarkvm_id.stdout.split(':')[1] }}
    register: cleanup_result
    failed_when: "cleanup_result.rc != 0"

  when: validation.run_storage_benchmark | d(true)
  rescue:
    - name: Best-effort cleanup of a leaked benchmark VM
      ansible.builtin.shell: >
        onevm terminate --hard {{ benchmarkvm_id.stdout.split(':')[1] | trim }}
      failed_when: false
      when:
        - benchmarkvm_id is defined
        - benchmarkvm_id.stdout is defined
        - "':' in (benchmarkvm_id.stdout | string)"

    - name: "Record storage benchmark failure for cluster '{{ current_cluster.name }}'"
      ansible.builtin.set_fact:
        verification_result: >-
          {{ (verification_result | d({}))
             | combine({'Storage benchmark' ~ current_cluster.report_suffix: 'failed'}) }}

    - name: "Show failure"
      ansible.builtin.debug:
        msg: "Storage benchmark failed in cluster '{{ current_cluster.name }}', continuing with the next cluster."
