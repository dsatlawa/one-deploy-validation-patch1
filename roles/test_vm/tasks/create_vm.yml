- name: Verify that VM image is in ready state
  ansible.builtin.shell: >
    oneimage list --f ID={{ _test_vm_template_image_ids_map[current_cluster.name] }} -l STAT --no-header
  register: image_state
  until: image_state.stdout in [ 'rdy', 'used' ]
  retries: 10
  delay: 10

# --nic anchors the VM to the cluster: the scheduler only considers hosts of
# the cluster the vnet belongs to.
- name: Instantiate test VM
  vars:
    _connect_vnet_name: >-
      {{ ((validation.cluster_overrides | d({})).get(current_cluster.name, {})).vnet_name
         | d(current_cluster.vnet_name) }}
  ansible.builtin.shell: >
    onetemplate instantiate {{ _test_vm_template_ids_map[current_cluster.name] }} --nic '{{ _connect_vnet_name }}'
  register: vm_id
  failed_when: "vm_id.rc != 0"

- name: Wait for VM come up
  ansible.builtin.shell: >
    onevm list --f ID={{vm_id.stdout.split(':')[1] | trim}} -l STAT --no-header
  register: vm_state
  failed_when: "vm_state.rc != 0"
  until: vm_state.stdout == "runn"
  retries: 10
  delay: 10

- name: Verify test VM
  set_fact:
    verification_result: "{{ (verification_result | default({})) | combine({'Test VM instantiation' ~ current_cluster.report_suffix : 'ok' }) }}"
