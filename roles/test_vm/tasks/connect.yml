- name: Determine active OpenNebula leader
  ansible.builtin.shell: >
    onezone show 0 -j | jq -r '.ZONE.SERVER_POOL.SERVER[] | select(.STATE == "3").NAME'
  register: _active_leader_raw
  run_once: true
  when: (groups[frontend_group | d('frontend')] | length) > 1

- name: Set active leader fact
  ansible.builtin.set_fact:
    active_leader: >-
      {{ groups[frontend_group | d('frontend')][0]
         if (groups[frontend_group | d('frontend')] | length) == 1
         else (_active_leader_raw.stdout | trim) }}
  run_once: true

- name: Check connection to VM
  when: validation.test_vm.vm.check_connection
  vars:
    # Force the vnet from validation.cluster_overrides when one is defined for
    # this cluster; fall back to the discovered/resolved cluster vnet otherwise.
    _connect_vnet_name: >-
      {{ ((validation.cluster_overrides | d({})).get(current_cluster.name, {})).vnet_name
         | d(current_cluster.vnet_name) }}
  block:
  - name: Attach NIC to test VM
    ansible.builtin.shell: >
      onevm nic-attach -n '{{ _connect_vnet_name }}' {{ vm_id.stdout.split(':')[1] | trim }}
    when: inventory_hostname == active_leader

  - name: Wait until NIC is attached
    ansible.builtin.shell: >
      onevm show -j {{vm_id.stdout.split(':')[1]}} | jq -r .VM.LCM_STATE
    when: inventory_hostname == active_leader
    register: vm_state_result
    until: vm_state_result.stdout | trim == "3"
    retries: 10
    delay: 5

  - name: Get VM IP
    ansible.builtin.shell: >
      onevm list --f ID={{vm_id.stdout.split(':')[1] | trim}} -l IP --no-header
    register: vm_ip
    failed_when: "vm_state.rc != 0"
  
  - name: Verify connection to the test VM
    ansible.builtin.shell: >
      ping -c 2 {{ vm_ip.stdout.split(',')[0] | trim }}
    register: vm_ping_result
    until: vm_ping_result.rc == 0
    retries: 10
    delay: 10
  
  - name: Record connection status to test VM
    set_fact:
      verification_result: "{{ verification_result | combine({'Connection to the test VM instance' ~ current_cluster.report_suffix : 'ok' }) }}"

  #onevm ssh --cmd "onegate vm show" {{ vm_id.stdout.split(':')[1] | trim }}
  - name: Check if onegate is running OK on the VM
    become: true
    become_user: oneadmin
    ansible.builtin.shell: >
      ssh -q -oStrictHostKeyChecking=no root@{{ vm_ip.stdout.split(',')[0] | trim }} onegate vm show
    register: vm_onegate_result
    ignore_errors: true

  - name: Show last result
    ansible.builtin.debug:
      var: vm_onegate_result
