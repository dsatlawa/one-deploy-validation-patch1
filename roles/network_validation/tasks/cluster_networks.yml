---
- name: "Reset per-cluster result lists (cluster '{{ current_cluster.name }}')"
  set_fact:
    gw_reachability_list: []
    ext_host_reachability_list: []
    dns_reachability_list: []
    vm_ips_list: []
  run_once: true

# Vnets are queried live (not from discovery) so vnets created earlier in the
# run (e.g. the test_vm vnet) are also covered.
# For each vnet of the cluster we also count how many of its Address Ranges
# are usable IP ranges (TYPE containing IP4 or IP6, i.e. IP4, IP6, IP4_6,
# IP6_STATIC, ...). ETHER-only or AR-less vnets yield ip_ars == 0.
- name: "Get OpenNebula networks of cluster '{{ current_cluster.name }}'"
  ansible.builtin.shell: >
    onevnet list -j | jq -c '[.VNET_POOL.VNET
      | if type=="object" then [.] else . end | .[]
      | select((.CLUSTERS.ID | if type=="array" then . else [.] end)
               | index("{{ current_cluster.id }}"))
      | {name: .NAME,
         ip_ars: ([.AR_POOL.AR // empty] | flatten
                  | map(select((.TYPE // "") | test("IP4|IP6")))
                  | length)}]'
  register: one_networks
  failed_when: "one_networks.rc != 0"
  run_once: true

# Networks are excluded from the test when:
#   - their name is listed in validation.network.skip_vnets, or
#   - validation.network.require_ip_ar is true (default) and the vnet has no
#     IP4/IP6 Address Range (e.g. no ARs at all, or only ETHER ARs). Such
#     vnets only assign a MAC address; the VM gets its IP via DHCP, which
#     this test cannot observe from the outside.
- name: "Build list of vNETs eligible for testing in cluster '{{ current_cluster.name }}'"
  vars:
    _nv_all: "{{ one_networks.stdout | from_json }}"
    _nv_skip_list: "{{ validation.network.skip_vnets | d([]) }}"
    _nv_min_ip_ars: "{{ (validation.network.require_ip_ar | d(true) | bool) | ternary(1, 0) }}"
  set_fact:
    _nv_networks: >-
      {{ _nv_all
         | rejectattr('name', 'in', _nv_skip_list)
         | selectattr('ip_ars', 'ge', _nv_min_ip_ars | int)
         | map(attribute='name') | list }}
  run_once: true

- name: Print network list
  debug:
    msg:
      - "Virtual Networks for testing in cluster {{ current_cluster.name }}: {{ _nv_networks | join(', ') if _nv_networks | length > 0 else '(none)' }}"
      - "Excluded vNETs (skip list / no IP4 or IP6 address range): {{ _nv_excluded | join(', ') if _nv_excluded | length > 0 else '(none)' }}"
  vars:
    _nv_excluded: "{{ one_networks.stdout | from_json | map(attribute='name') | list | difference(_nv_networks) }}"
  run_once: true

- name: "Record that no eligible networks were found in cluster '{{ current_cluster.name }}'"
  set_fact:
    network_verification_results: >-
      {{ (network_verification_results | default({}))
         | combine({(current_cluster.name ~ '/networks'):
                    {'Result': 'skipped (no eligible vNETs)'}}) }}
  run_once: true
  when: _nv_networks | length == 0

- name: "Run network tests for cluster '{{ current_cluster.name }}'"
  when: _nv_networks | length > 0
  block:
    # We'll use the per-cluster VM template exported by the test_vm role
    #
    - name: Instantiate VM at each network
      ansible.builtin.shell: >
        onetemplate instantiate '{{ validation.test_vm.vm.market_name }}{{ current_cluster.name_suffix }}' --nic '{{ item }}'
      register: vms
      failed_when: "vms.rc != 0"
      loop: "{{ _nv_networks }}"
      run_once: true

    - name: Wait for VM come up
      ansible.builtin.shell: >
        onevm list --f ID={{ item.stdout.split(':')[1] | trim}} -l STAT --no-header
      register: vm_state
      failed_when: "vm_state.rc != 0"
      until: vm_state.stdout == "runn"
      retries: 10
      delay: 10
      loop: "{{ vms.results }}"
      run_once: true

    - name: Get VM IP
      ansible.builtin.shell: >
        onevm list --f ID={{item.stdout.split(':')[1] | trim}} -l IP --no-header
      register: vm_ip
      loop: "{{ vms.results }}"
      run_once: true

    - name: Verify ssh connection to the test VM
      ansible.builtin.shell: >
        ssh -i ~oneadmin/.ssh/id_rsa -o StrictHostKeyChecking=no root@{{item.stdout}} hostname
      register: vm_ssh_result
      until: vm_ssh_result.rc == 0
      retries: 30
      delay: 20
      loop: "{{ vm_ip.results }}"
      run_once: true

    - name: Save VM IPs to list
      set_fact:
        vm_ips_list: "{{ vm_ip.results | map(attribute='stdout') | list }}"

    - name: Install required packages
      ansible.builtin.shell: |
        ssh -i ~oneadmin/.ssh/id_rsa -o StrictHostKeyChecking=no root@{{item.stdout}} apk update
        ssh -i ~oneadmin/.ssh/id_rsa -o StrictHostKeyChecking=no root@{{item.stdout}} apk add bind-tools jq jc
      register: installation_result
      loop: "{{ vm_ip.results }}"
      run_once: true

    - name: Check GW reachability from VM
      ansible.builtin.shell: |
        ssh -i ~oneadmin/.ssh/id_rsa -q -oStrictHostKeyChecking=no root@{{item.stdout}} "ping -c 10 \$(ip route show default | awk '/default/ {print \$3}') | jc --ping --pretty"
      register: gw_reachability
      loop: "{{ vm_ip.results }}"
      run_once: true

    - name: Check DNS resolvation
      ansible.builtin.shell: |
        ssh -i ~oneadmin/.ssh/id_rsa -q -oStrictHostKeyChecking=no root@{{item.stdout}} "dig {{ validation.network.ext_host }} | jc --dig -p | jq '.[].answer[].data'"
      register: dns_reachability
      loop: "{{ vm_ip.results }}"
      run_once: true

    - name: Check external host reachability from the test VM
      ansible.builtin.shell: |
        ssh -i ~oneadmin/.ssh/id_rsa -q -oStrictHostKeyChecking=no root@{{item.stdout}} "ping -c 3 {{ validation.network.ext_host  }} | /usr/bin/jc --ping --pretty"
      register: ext_host_reachability
      loop: "{{ vm_ip.results }}"
      run_once: true

    - name: Save GW test results to list
      set_fact:
        gw_reachability_list: "{{ gw_reachability_list | default([]) + [item.stdout] }}"
      loop: "{{ gw_reachability.results }}"
      run_once: true

    - name: Save ext host ping test results to list
      set_fact:
        ext_host_reachability_list: "{{ ext_host_reachability_list | default([]) + [item.stdout] }}"
      loop: "{{ ext_host_reachability.results }}"
      run_once: true

    - name: Save DNS resolvation test results to list
      set_fact:
        dns_reachability_list: "{{ dns_reachability_list | default([]) + [item.stdout] }}"
      loop: "{{ dns_reachability.results }}"
      run_once: true

    - name: Save VM IPs for report
      vars:
        _nv_prefix: "{{ (_one_clusters_multi | bool) | ternary(current_cluster.name ~ '/', '') }}"
      set_fact:
        network_verification_results: "{{ (network_verification_results | default({})) | combine({(_nv_prefix ~ item.0): {'Test VM IP': item.1, '\nNetwork GW ping, packet received': item.2, '\nExternal Host ping: ': item.3, '\nExternal host DNS resolvation':item.4}}) }}"
      loop: "{{ _nv_networks | zip(vm_ips_list, gw_reachability_list, ext_host_reachability_list, dns_reachability_list) | list }}"

    - name: Remove test VMs
      ansible.builtin.shell: >
        onevm terminate '{{ item.stdout.split(':')[1] | trim }}'
      register: terminated_vms
      failed_when: "terminated_vms.rc != 0"
      loop: "{{ vms.results }}"
      run_once: true
