---
- hosts: all
  roles:
    - role: validation_common

- hosts: "{{ frontend_group | d('frontend') }}"
  roles:
    - role: test_vm
      when: validation.run_test_vm | d(true)
    - role: storage-benchmark
      when: validation.run_storage_benchmark | d(true)
    - role: ldap_auth
      when: validation.run_ldap_auth | d(false)
      tags:
        - ldap_auth
    - role: validation_frontend
    - role: network_validation
      when: validation.networks_verification | d(true)

# Run connectivity tests between virtual machines
- hosts: "{{ node_group | d('node') }},{{ frontend_group | d('frontend') }}"
  gather_facts: true
  roles:
    - role: conn_matrix
      when: validation.run_conn_matrix | d(true)

# Run network tests on the hypervisor hosts
- hosts: "{{ node_group | d('node') }}"
  roles:
    - role: network-benchmark

# VM HA Validation
- hosts: "{{ frontend_group | d('frontend') }}"
  tasks:
    - name: VM HA Validation
      include_role:
        name: vm-ha
      when: validation.run_vm_ha | d(false)

# Cleanup the test VMs
- hosts: "{{ frontend_group | d('frontend') }}"
  roles:
    - role: cleanup_test_vm

# Will launch validation framework on the frontends
- hosts: "{{ frontend_group | d('frontend') }}"
  roles:
    - role: validation

# Will launch OneFlow Smoke test
- hosts: "{{ frontend_group | d('frontend') }}"
  tasks:
    - block:
        - name: Run OneFlow validation
          import_role:
            name: oneflow_validation
      rescue:
        - debug:
            msg: "OneFlow role failed, continue with the rest"
      always:
        - debug:
            msg: "Proceeding to the next role"

# Run FE HA verification only when variable run_fe_ha is set to true
- hosts: "{{ frontend_group | d('frontend') }}"
  roles:
    - role: fe_ha
      when: validation.run_fe_ha | d(false)

# Run Federation validation when variable run_federation is set to true
- hosts: "{{ frontend_group | d('frontend') }}"
  roles:
    - role: federation
      when: validation.run_federation | d(false)

# Render verification report
- hosts: localhost
  gather_facts: false
  become: false
  vars:
    report_frontend_host: "{{ groups[frontend_group | d('frontend')][0] }}"
    report_verification_result: "{{ hostvars[report_frontend_host].verification_result | default({'No verification results were found': 'N/A'}) }}"
    report_verification_comments: "{{ hostvars[report_frontend_host].verification_comments | default({}) }}"
    report_network_verification_results: "{{ hostvars[report_frontend_host].network_verification_results | default({'No Network verification results were found': {'N/A':'N/A'}}) }}"
    date: "{{ lookup('pipe', 'date +%Y-%m-%d\\ %H:%M:%S') }}"
    validation_vars: "{{ hostvars[report_frontend_host].validation | default({}) }}"
    report_default_abstract: >-
      This report describes the actions to verify the configuration and operational level of the OpenNebula cloud. As a result of this analysis the operational level of each component is established, if needed specific configuration updates are recommended.
  vars_prompt:
    - name: prompt_report_customer
      prompt: "Customer"
      private: false
    - name: prompt_report_document_version
      prompt: "Report version"
      private: false
    - name: prompt_report_abstract
      prompt: "Abstract (leave blank to use default)"
      private: false
      default: ""
    - name: prompt_report_revision_comment
      prompt: "Revision history comment (optional)"
      private: false
      default: ""
    - name: prompt_report_revision_version
      prompt: "Revision history version (leave blank to reuse report version)"
      private: false
      default: ""
  tasks:
    - name: Get repository version
      ansible.builtin.shell: |
        git describe --tags --exact-match 2>/dev/null || git rev-parse --short HEAD
      args:
        chdir: "{{ playbook_dir }}/.."
      register: repo_version_cmd
      changed_when: false

    - name: Collect network benchmark results from node hosts
      # Build a map of node -> { iperf_results, ping_exec } so the report can render them
      ansible.builtin.set_fact:
        network_benchmark: "{{ network_benchmark | default({}) | combine({ item: {'iperf_results': hostvars[item].iperf_results | default(None), 'ping_exec': hostvars[item].ping_exec | default(None)} }) }}"
      loop: "{{ groups[node_group | d('node')] }}"
      loop_control:
        label: "{{ item }}"

    - name: Collect storage benchmark results from frontend hosts
      # Merge storage_benchmark maps built by the role
      ansible.builtin.set_fact:
        storage_benchmark: "{{ storage_benchmark | default({}) | combine(hostvars[item].storage_benchmark | default({}), recursive=True) }}"
      loop: "{{ groups[frontend_group | d('frontend')] }}"
      loop_control:
        label: "{{ item }}"

    - name: Collect federation results from all frontend hosts
      # Build a map of frontend -> verification_result for federation checks
      ansible.builtin.set_fact:
        all_federation_results: "{{ all_federation_results | default({}) | combine({item: hostvars[item].verification_result | default({})}) }}"
      loop: "{{ groups[frontend_group | d('frontend')] }}"
      when:
        - hostvars[item].verification_result is defined
        - validation.run_federation | d(false)
      loop_control:
        label: "{{ item }}"

    - name: Build IP -> hostname mapping for report
      ansible.builtin.set_fact:
        ip_to_hostname: "{{ ip_to_hostname | default({}) | combine({ (hostvars[item].get('ansible_host')): item }) }}"
      loop: "{{ groups['all'] }}"
      when: hostvars[item].get('ansible_host', '') != ''
      loop_control:
        label: "{{ item }}"

    - name: Build report architecture from inventory
      ansible.builtin.set_fact:
        discovered_report_architecture:
          summary: >-
            Architecture: {{ (groups[frontend_group | d('frontend')] | default([])) | length }} frontends
            &nbsp;·&nbsp; {{ (groups[node_group | d('node')] | default([])) | length }} hypervisors
          frontends: "{{ _report_arch_frontends }}"
          hypervisors: "{{ _report_arch_hypervisors }}"
          frontend_count: "{{ _report_arch_frontends | length }}"
          hypervisor_count: "{{ _report_arch_hypervisors | length }}"
      vars:
        _report_arch_frontends: >-
          {%- set out = [] -%}
          {%- for host in groups[frontend_group | d('frontend')] | default([]) -%}
            {%- set _ = out.append({
              'inventory_name': host,
              'ansible_host': hostvars[host].get('ansible_host', '')
            }) -%}
          {%- endfor -%}
          {{ out }}
        _report_arch_hypervisors: >-
          {%- set out = [] -%}
          {%- for host in groups[node_group | d('node')] | default([]) -%}
            {%- set _ = out.append({
              'inventory_name': host,
              'ansible_host': hostvars[host].get('ansible_host', '')
            }) -%}
          {%- endfor -%}
          {{ out }}

    - name: Render report
      template:
        src: "appendix-cloud-report.j2"
        dest: /tmp/cloud_verification_report.html
      vars:
        repo_version: "{{ repo_version_cmd.stdout }}"
        date: "{{ lookup('pipe', 'date +%Y-%m-%d\\ %H:%M:%S') }}"
        report_date_only: "{{ lookup('pipe', 'date +%Y-%m-%d') }}"
        verification_result: "{{ report_verification_result }}"
        verification_comments: "{{ report_verification_comments }}"
        network_verification_results: "{{ report_network_verification_results }}"
        template_report_architecture: "{{ discovered_report_architecture | default({}) }}"
        template_report_customer: "{{ prompt_report_customer }}"
        template_report_document_version: "{{ prompt_report_document_version }}"
        template_report_abstract: "{{ prompt_report_abstract }}"
        template_report_default_abstract: "{{ report_default_abstract }}"
        template_report_revision_comment: "{{ prompt_report_revision_comment }}"
        template_report_revision_version: "{{ prompt_report_revision_version }}"

    - name: Render PDF print stylesheet
      ansible.builtin.template:
        src: "print_fix.css"
        dest: /tmp/print_fix.css

    - name: Generate PDF report
      ansible.builtin.command:
        argv:
          - weasyprint
          - -s
          - /tmp/print_fix.css
          - /tmp/cloud_verification_report.html
          - /tmp/cloud_verification_report.pdf
      register: report_pdf_cmd
      changed_when: report_pdf_cmd.rc == 0

    - name: Print report location
      ansible.builtin.debug:
        msg: |
          ******************************************************
          Verification report rendered to /tmp/cloud_verification_report.html
          PDF report rendered to /tmp/cloud_verification_report.pdf
          ******************************************************
